version: '3.8'

services:
  ai-radar:
    build: .
    container_name: ai-radar
    ports:
      - "8001:8000"  # FastAPI backend (serves Vue frontend)
    volumes:
      - ai-radar-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ai-radar-data:
